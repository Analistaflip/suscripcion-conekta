<!DOCTYPE html>
<html>
<head>
  <title>Suscripción</title>
  <script src="https://cdn.conekta.io/js/latest/conekta.js"></script>
</head>
<body>

<h2>Suscribirme</h2>

<form id="card-form">
  <input type="email" id="email" placeholder="Email" required><br><br>

  <input type="text" data-conekta="card[name]" placeholder="Nombre en tarjeta"><br><br>
  <input type="text" data-conekta="card[number]" placeholder="Número de tarjeta"><br><br>
  <input type="text" data-conekta="card[cvc]" placeholder="CVC"><br><br>
  <input type="text" data-conekta="card[exp_month]" placeholder="Mes (MM)"><br><br>
  <input type="text" data-conekta="card[exp_year]" placeholder="Año (YY)"><br><br>

  <button type="submit">Suscribirme</button>
</form>

<p id="status"></p>

<script>
  Conekta.setPublicKey("TU_PUBLIC_KEY");

  const form = document.getElementById("card-form");
  const status = document.getElementById("status");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    status.innerText = "Procesando...";

    Conekta.Token.create(form, function(token) {

      fetch("https://TU_BACKEND.up.railway.app/crear-suscripcion", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          token: token.id,
          name: form.querySelector('[data-conekta="card[name]"]').value,
          email: document.getElementById("email").value
        })
      })
      .then(res => res.json())
      .then(data => {
        status.innerText = "Suscripción exitosa 🚀";
      })
      .catch(err => {
        status.innerText = "Error en el pago";
      });

    }, function(error) {
      status.innerText = error.message_to_purchaser;
    });
  });
</script>

</body>
</html>
